apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: datastore-applicationset
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Deepika171256/Project.git
        revision: main
        directories:
          - path: datastore-be
          - path: datastore-fe
  template:
    metadata:
      name: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Deepika171256/Project.git
        targetRevision: main
        path: '{{path.basename}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true

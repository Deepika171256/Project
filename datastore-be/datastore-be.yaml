apiVersion: apps/v1
kind: Deployment
metadata:
  name: datastore-backend
  labels:
    type: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      type: backend
  template:
    metadata:
      name: datastore-backend
      labels:
        type: backend
    spec:
      containers:
        - name: datastore-backend
          image: deepika1725/datastore-backend:v47.0
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlHost
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: datastore-be-cm
                  key: mysqlUname
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: datastore-be-secret
                  key: mysqlPassword
          resources:
            requests:
              cpu: 100m
              memory: "500Mi"
            limits:
              cpu: 1
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 4
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 4
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 4
            failureThreshold: 3
          volumeMounts:
            - name: datastore-storage
              mountPath: /app/data   # container lo path
      volumes:
        - name: datastore-storage
          persistentVolumeClaim:
            claimName: datastore-pvc   # PVC name
---
apiVersion: v1
kind: Service
metadata:
  name: datastore-backend-svc
spec:
  ports:
    - port: 8081
      targetPort: 8084
  selector:
    type: backend
